<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="LunaX.ico">
    <title>Coming Soon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            animation: slideIn 1.5s ease-out;
        }

        p {
            font-size: 1.5rem;
            margin: 20px 0;
            animation: slideIn 2s ease-out;
        }

        .social-links {
            margin-top: 40px;
            animation: fadeIn 4s ease-in-out;
        }

        .social-links a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: #ccc;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coming Soon!</h1>
        <p>We're working on something awesome. Stay tuned!</p>
        <div class="social-links">
            <a href="https://discord.gg/B348Cp8mhy" target="_blank">Discord</a>
            <a href="https://github.com/Apadlehetnekxd/Luna_X" target="_blank">GitHub</a>
        </div>
    </div>
</body>
</html>
