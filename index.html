<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna X</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }
        canvas {
            display: block;
            background: black;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const islandWidth = 150;
        const islandHeight = 20;
        let islandX = canvas.width / 2 - islandWidth / 2;
        const islandY = canvas.height - islandHeight - 10;
        const islandSpeed = 8;

        const ballRadius = 10;
        let ballX = canvas.width / 2;
        let ballY = canvas.height / 2;
        let ballSpeedX = 6;
        let ballSpeedY = 6;
        let score = 0;

        let keys = {};
        window.addEventListener("keydown", (e) => keys[e.key] = true);
        window.addEventListener("keyup", (e) => keys[e.key] = false);

        function resetGame() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballSpeedX = 6;
            ballSpeedY = 6;
            islandX = canvas.width / 2 - islandWidth / 2;
            score = 0;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (keys["a"] || keys["ArrowLeft"]) islandX -= islandSpeed;
            if (keys["d"] || keys["ArrowRight"]) islandX += islandSpeed;

            if (islandX < 0) islandX = 0;
            if (islandX + islandWidth > canvas.width) islandX = canvas.width - islandWidth;

            ballX += ballSpeedX;
            ballY += ballSpeedY;

            if (ballX - ballRadius <= 0 || ballX + ballRadius >= canvas.width) {
                ballSpeedX = -ballSpeedX;
            }
            if (ballY - ballRadius <= 0) {
                ballSpeedY = -ballSpeedY;
            }

            if (ballY + ballRadius >= islandY && ballX >= islandX && ballX <= islandX + islandWidth) {
                ballSpeedY = -ballSpeedY;
                score++;
            }

            if (ballY + ballRadius > canvas.height) {
                resetGame();
            }

            ctx.fillStyle = "white";
            ctx.fillRect(islandX, islandY, islandWidth, islandHeight);
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.font = "20px Arial";
            ctx.fillText("Score: " + score, 20, 30);

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
